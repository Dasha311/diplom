            'ИИ может ошибаться. Проверяйте важную информацию на сайте AlmaU.': { kz: 'ЖИ қателесуі мүмкін. Маңызды ақпаратты AlmaU сайтынан тексеріңіз.', en: 'AI can make mistakes. Please verify important information on the AlmaU website.' },
            'Привет! Я ИИ‑ассистент AlmaU.': { kz: 'Сәлем! Мен AlmaU ЖИ‑ассистентімін.', en: 'Hi! I am the AlmaU AI assistant.' },
            '• расскажу о программах и школах': { kz: '• бағдарламалар мен мектептер туралы айтып беремін', en: '• tell you about programs and schools' },
            '• помогу с поступлением и грантами': { kz: '• қабылдау мен гранттар бойынша көмектесемін', en: '• help with admission and grants' },
            '• подскажу контакты и события': { kz: '• байланыстар мен оқиғаларды көрсетемін', en: '• share contacts and events' }
        };

        const attrTranslations = {
            placeholder: {
                'Введите ваш вопрос...': { kz: 'Сұрағыңызды енгізіңіз...', en: 'Type your question...' }
            },
            value: {
                'Отправить': { kz: 'Жіберу', en: 'Send' }
            }
        };

        const yearNode = document.getElementById('footerYear');
        if (yearNode) {
            yearNode.textContent = new Date().getFullYear();
        }

        const currentNode = document.querySelector('[data-lang-current]');
        const options = document.querySelectorAll('[data-lang-option]');
        const savedLang = localStorage.getItem('almau-language') || 'ru';
        const pageLanguage = '{{ current_language|default:"ru"|escapejs }}' || 'ru';
        const labels = { ru: 'ru', kz: 'kz', en: 'eng' };
        const nodeStore = new WeakMap();
        const attrStore = new WeakMap();

        function translateKey(key, lang) {
            return dictionary[lang] && dictionary[lang][key] ? dictionary[lang][key] : (dictionary.ru[key] || '');
        }

        function getNodeOriginal(node) {
            if (!nodeStore.has(node)) {
                nodeStore.set(node, node.textContent);
            }
            return nodeStore.get(node);
        }

        function getAttrOriginal(el, attr) {
            if (!attrStore.has(el)) {
                attrStore.set(el, {});
            }
            const attrs = attrStore.get(el);
            if (!(attr in attrs)) {
                attrs[attr] = el.getAttribute(attr) || '';
            }
            return attrs[attr];
        }

        function translateByDataKey(lang) {
            document.querySelectorAll('[data-i18n]').forEach((element) => {
                const key = element.dataset.i18n;
                const translated = translateKey(key, lang);
                if (translated) {
                    element.textContent = translated;
                }
            });

            document.querySelectorAll('[data-i18n-attr]').forEach((element) => {
                const attrName = element.dataset.i18nAttr;
                const key = element.dataset.i18nAttrKey;
                const translated = translateKey(key, lang);
                if (attrName && translated) {
                    element.setAttribute(attrName, translated);
                }
            });
        }

        function translateTextNodes(lang) {
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
                acceptNode(node) {
                    if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
                    const parent = node.parentElement;
                    if (!parent) return NodeFilter.FILTER_REJECT;
                    if (['SCRIPT', 'STYLE', 'NOSCRIPT'].includes(parent.tagName)) return NodeFilter.FILTER_REJECT;
                    return NodeFilter.FILTER_ACCEPT;
                }
            });

            let node;
            while ((node = walker.nextNode())) {
                const original = getNodeOriginal(node);
                const normalized = original.trim();
                const translated = lang === 'ru' ? original : exactTextTranslations[normalized] && exactTextTranslations[normalized][lang];
                if (!normalized || translated === undefined) {
                    node.textContent = original;
                    continue;
                }
                const prefix = original.match(/^\s*/)[0];
                const suffix = original.match(/\s*$/)[0];
                node.textContent = prefix + translated + suffix;
            }
        }

        function translateAttributes(lang) {
            Object.entries(attrTranslations).forEach(([attrName, map]) => {
                document.querySelectorAll('[' + attrName + ']').forEach((element) => {
                    const original = getAttrOriginal(element, attrName);
                    const translated = lang === 'ru' ? original : (map[original] && map[original][lang]);
                    element.setAttribute(attrName, translated || original);
                });
            });
        }

        function translateTitle(lang) {
            if (!document.title) return;
            if (!window.__originalTitle) {
                window.__originalTitle = document.title;
            }
            const original = window.__originalTitle;
            const translated = lang === 'ru' ? original : (exactTextTranslations[original] && exactTextTranslations[original][lang]);
            document.title = translated || original;
        }

        function applyLang(lang) {
            const currentLang = labels[lang] ? lang : 'ru';
            if (currentNode) {
                currentNode.textContent = labels[currentLang];
            }
            document.documentElement.lang = currentLang === 'en' ? 'en' : currentLang;
            options.forEach((option) => {
                option.classList.toggle('is-active', option.dataset.langOption === currentLang);
            });
             translateByDataKey(currentLang);
            translateTextNodes(currentLang);
            translateAttributes(currentLang);
            translateTitle(currentLang);
            window.__almauLanguage = currentLang;
        }

        async function persistLanguage(lang) {
            const target = document.querySelector('[data-lang-option="' + lang + '"]');
            if (!target) return;
            try {
                const response = await fetch(target.href, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' },
                    credentials: 'same-origin'
                });
                if (!response.ok) {
                    throw new Error('Request failed');
                }
            } catch (error) {
                window.location.href = target.href;
                return;
            }
            applyLang(lang);
        }

        applyLang(pageLanguage);

        options.forEach((option) => {
            option.addEventListener('click', function (event) {
                event.preventDefault();
                persistLanguage(this.dataset.langOption);
            });
        });
    })();
</script>
